display_information:
  name: "Firetower" # test: "Firetower Test"
  description: "Sentry incident management bot"
  background_color: "#000000"
features:
  bot_user:
    display_name: "Firetower" # test: "Firetower Test"
    always_online: true
  slash_commands:
    - command: /ft # test: /ft-test
      description: Manage incidents - use /ft help for usage # test: /ft-test
      usage_hint: "[command] [args...]"
      should_escape: false
oauth_config:
  scopes:
    bot:
      - bookmarks:write
      - channels:history
      - channels:manage
      - channels:read
      - chat:write
      - commands
      - groups:history
      - groups:read
      - groups:write
      - users:read
      - users:read.email
  pkce_enabled: false
settings:
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
